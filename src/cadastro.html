<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Cliente</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Cadastrar Novo Cliente</h1>
  </header>

  <main>
    <form id="formCadastro" onsubmit="cadastrarCliente(event)">
      <div class="form-group">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required 
        placeholder="Ex: João da Silva" />
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required 
        placeholder="Ex: joao@email.com" />
      </div>

      <div class="form-group">
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required 
        placeholder="Digite uma senha (mínimo 6 caracteres)" minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirmar_senha">Confirmar Senha:</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" required 
        placeholder="Confirme sua senha" />
      </div>

      <div class="form-group">
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required 
        placeholder="Ex: 123.456.789-00" maxlength="14" />
      </div>

      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" 
        placeholder="Ex: (11) 98765-4321" />
      </div>

      <div class="form-group">
        <label for="data_nascimento">Data de Nascimento:</label>
        <input type="date" id="data_nascimento" name="data_nascimento" />
      </div>

      <div class="form-group">
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" name="bairro" 
        placeholder="Ex: Centro" />
      </div>

      <div class="botoes-container">
        <button type="submit" class="btn-cadastrar">Cadastrar</button>
        <button type="button" class="btn-voltar" onclick="voltarParaBusca()">Voltar</button>
      </div>
    </form>

    <div id="resultado"></div>
  </main>

  <script src="cadastro.js"></script>
</body>

</html>
