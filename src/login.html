<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login do Sistema</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Login do Sistema</h1>
  </header>

  <main>
    <form id="formLogin" onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required 
        placeholder="Ex: seu@email.com" />
      </div>

      <div class="form-group">
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required 
        placeholder="Digite sua senha" />
      </div>

      <div class="botoes-container">
        <button type="submit" class="btn-login">Login</button>
        <button type="button" class="btn-cadastrar" onclick="irParaCadastro()">Cadastrar</button>
        <button type="button" class="btn-voltar" onclick="voltarAoInicio()">🏠 Voltar ao Início</button>
        <button type="button" class="btn-voltar" onclick="irParaBusca()">Buscar Clientes</button>
      </div>
    </form>

    <div id="resultado"></div>
  </main>

  <script src="login.js"></script>
</body>
</html>
